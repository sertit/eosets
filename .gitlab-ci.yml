---
stages:
  - lint
  - test
variables:
  EO_CONTAINERS: $REGISTRY_GITLAB/eo-containers
  EOSETS_CHANGES: eosets/**/[^_]*.{py,xml}
include:
  - project: sertit/groupware
    file: /ci_templates/lint_3_10.yaml
  - project: sertit/groupware
    file: /ci_templates/pytest.yaml
.rules_pytest:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - changes:
        - $EOSETS_CHANGES
        - ci/**/*.{py,xml}
        - .gitlab-ci.yml
.pytest_tags:
  tags:
    - sertit
    - linux
    - high_memory
pytest:
  image: $EO_CONTAINERS:geo_latest
  extends:
    - .pytest
    - .rules_pytest
    - .pytest_tags
  variables:
    CI_EOSETS_USE_S3: "0"
    PATH_TO_TEST: ci
    COV: eosets
pytest_s3:
  image: $EO_CONTAINERS:geo_latest
  extends:
    - .pytest
    - .rules_pytest
    - .pytest_tags
  variables:
    CI_EOSETS_USE_S3: "1"
    PATH_TO_TEST: ci
    COV: eosets
pytest_end_to_end_314:
  image: $EO_CONTAINERS:geo_314_latest
  extends:
    - .pytest
    - .pytest_tags
  variables:
    CI_EOSETS_USE_S3: "0"
    PATH_TO_TEST: ci
    COV: eosets
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_NAME == "3.14"
      when: always
